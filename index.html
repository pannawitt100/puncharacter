<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8" />

<title>Pannawit</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />

</head>

<body>



<header>

<div class="main-title">Pannawit</div>

<div class="sub-title">pannawit character (AR)</div>

</header>



<!-- Litman-->

<div class="ar-section">

<div class="head-title">Litman</div>

<div class="sub-title">A concept design of Hitman, but with more drip.</div>

<model-viewer id="model1"

     src="Litman.glb"

     ios-src="Litman.usdz"

     ar

     ar-modes="scene-viewer webxr quick-look"

     camera-controls

     autoplay

     auto-rotate

     shadow-intensity="1"

     shadow-softness="1"

     environment-image="neutral.hdr"

     loading="eager"

     reveal="auto"

     style="width: 100%; height: 400px;">

</model-viewer>

<button class="ar-button" onclick="triggerAR('model1')">Play AR</button>

</div>



<!-- TwoTwo-->

<div class="ar-section">

<div class="head-title">TwoTwo</div>

<div class="sub-title">The design concept was inspired by hot and cold </div>

<model-viewer id="model2"

     src="Twotwo.glb"

     ios-src="Twotwo.usdz"

     ar

     ar-modes="scene-viewer webxr quick-look"

     camera-controls

     autoplay

     auto-rotate

     shadow-intensity="1"

     shadow-softness="1"

     environment-image="neutral.hdr"

     loading="eager"

     reveal="auto"

     style="width: 100%; height: 400px;">

</model-viewer>

<button class="ar-button" onclick="triggerAR('model2')">Play AR</button>

</div>


<!-- Room-->

<div class="ar-section">

<div class="head-title">Room</div>

<div class="sub-title">The design concept was inspired by my dream room</div>

<model-viewer id="model2"

     src="room.glb"

     ios-src="room.usdz"

     ar

     ar-modes="scene-viewer webxr quick-look"

     camera-controls

     autoplay

     auto-rotate

     shadow-intensity="1"

     shadow-softness="1"

     environment-image="neutral.hdr"

     loading="eager"

     reveal="auto"

     style="width: 100%; height: 400px;">

</model-viewer>

<button class="ar-button" onclick="triggerAR('model2')">Play AR</button>

</div>



<footer>

<div class="footer-link"><strong>youtube:</strong> <a href="https://www.youtube.com/@user-xg9uz5yp8e" target="_blank">youtube.com</a></div>

</footer>



<!-- ✅ โหลด model-viewer หลังสุดเพื่อให้โหลดหน้าเว็บเร็วขึ้น -->

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>



<!-- ✅ Script ปุ่ม Play AR พร้อม catch error -->

<script>

   function triggerAR(id) {

     const viewer = document.getElementById(id);

     if (viewer && viewer.activateAR) {

       viewer.activateAR().catch((error) => {

         alert("AR ไม่พร้อมบนอุปกรณ์นี้ หรือถูกบล็อกโดย browser\n(แนะนำให้กดปุ่ม AR บนมุมขวาของโมเดลแทน)");

         console.warn("activateAR failed:", error);

       });

     }

   }

</script>



</body>

</html>
